services:
  shell:
    image: jedicave:latest
    init: true
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    working_dir: /workspace
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      # Persistent named volumes (survive rebuilds)
      - claude-code-bashhistory:/commandhistory
      - claude-code-config:/env/.claude
      # - claude-code-gh:/env/.config/gh  # Disabled: gh CLI removed to prevent exfiltration
      # Host git config (disabled: leaks identity to container)
      # - ${HOME}/.gitconfig:/env/.gitconfig:ro
      # Project source mounts go in docker-compose.override.yml:
      #   services:
      #     shell:
      #       volumes:
      #         - /home/user/code/my-project:/workspace/my-project

volumes:
  claude-code-bashhistory:
  claude-code-config:
